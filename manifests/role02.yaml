apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vcenter-ldaps-reconciler
  namespace: ldaps-sync
  labels:
    app.kubernetes.io/name: ldaps-vcenter-sync
    app.kubernetes.io/component: reconciler
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]