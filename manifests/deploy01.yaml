apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcenter-ldaps-reconciler
  namespace: ldaps-sync
  labels:
    app.kubernetes.io/name: ldaps-vcenter-sync
    app.kubernetes.io/component: reconciler
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ldaps-vcenter-sync
      app.kubernetes.io/component: reconciler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ldaps-vcenter-sync
        app.kubernetes.io/component: reconciler
    spec:
      serviceAccountName: vcenter-ldaps-reconciler
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: reconciler
          # Sostituisci con la tua immagine reale.
          image: ghcr.io/example/vcenter-ldaps-reconciler:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ldaps-sync-config
            - secretRef:
                name: vcenter-api-credentials
            - secretRef:
                name: ldaps-bind-credentials
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          # Logica attesa:
          # 1) watch della Secret CURRENT_CERT_SECRET_NAME
          # 2) quando cambia, legge cert-chain.pem
          # 3) effettua login REST su vCenter
          # 4) aggiorna il provider VCENTER_PROVIDER_NAME
          # 5) imposta make_default=true
          args:
            - watch-secret-and-reconcile
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]