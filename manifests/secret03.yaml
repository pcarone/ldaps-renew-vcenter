apiVersion: v1
kind: Secret
metadata:
  name: ldaps-bind-credentials
  namespace: ldaps-sync
  labels:
    app.kubernetes.io/name: ldaps-vcenter-sync
    app.kubernetes.io/component: credentials
# Credenziali del bind user AD/LDAP che il reconciler userà nel payload verso vCenter.
type: Opaque
stringData:
  BIND_USERNAME: "CN=svc-vcenter,OU=Service Accounts,DC=example,DC=local"
  BIND_PASSWORD: "__REPLACE_ME__"