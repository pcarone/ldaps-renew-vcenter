apiVersion: v1
kind: Secret
metadata:
  name: ldaps-current
  namespace: ldaps-sync
  labels:
    app.kubernetes.io/name: ldaps-vcenter-sync
    app.kubernetes.io/component: current-certs
# Secret "corrente" mantenuta dal checker.
# Il checker la confronta con i certificati esposti dai DC e la aggiorna solo in caso di mismatch.
type: Opaque
stringData:
  cert-chain.pem: |
    -----BEGIN CERTIFICATE-----
    __PUT_CURRENT_LDAPS_CHAIN_HERE__
    -----END CERTIFICATE-----
  metadata.json: |
    {
      "source": "manual-bootstrap",
      "domain": "example.local",
      "primary_ldaps_url": "ldaps://dc1.example.local:636",
      "secondary_ldaps_url": "ldaps://dc2.example.local:636",
      "fingerprint_sha256": "__OPTIONAL__",
      "not_before": "__OPTIONAL__",
      "not_after": "__OPTIONAL__",
      "updated_at": "1970-01-01T00:00:00Z"
    }